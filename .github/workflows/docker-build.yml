name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openises/ticketscad

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test the built image
        if: github.event_name != 'pull_request'
        run: |
          # Start the stack
          docker compose up -d

          # Wait for auto-install to complete (DB health check + table creation + Apache start)
          echo "Waiting for TicketsCAD to start..."
          for i in $(seq 1 40); do
            if docker logs ticketscad 2>&1 | grep -q "Starting Apache"; then
              echo "Apache started after ~$((i*5)) seconds"
              sleep 5
              break
            fi
            if [ $i -eq 40 ]; then
              echo "TIMEOUT: Apache did not start in 200 seconds"
              docker compose logs
              exit 1
            fi
            sleep 5
          done

          # Verify web server responds
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAILED: Expected HTTP 200, got $HTTP_CODE"
            docker compose logs
            exit 1
          fi

          # Verify database was initialized
          TABLES=$(docker exec ticketscad_db mariadb -u tickets -ptickets tickets -N -e "SELECT COUNT(*) FROM information_schema.TABLES WHERE TABLE_SCHEMA='tickets'" 2>/dev/null)
          echo "Tables: $TABLES"
          if [ "${TABLES:-0}" -lt 50 ]; then
            echo "FAILED: Expected 50+ tables, got $TABLES"
            docker compose logs
            exit 1
          fi

          # Cleanup
          docker compose down -v
          echo "Docker image test passed!"
